<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>管理后台 - 仪表盘</title>
    <link rel="stylesheet" href="/common/styles.css" />
    <link rel="stylesheet" href="/pages/admin/admin.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  </head>
  <body>
    <div class="admin-layout">
      <!-- 侧边栏 -->
      <aside class="admin-sidebar">
        <div class="admin-logo">管理后台</div>
        <nav class="admin-nav">
          <a href="/pages/admin/dashboard.html" class="admin-nav-item active">
            <span>📊</span> 仪表盘
          </a>
          <a href="/pages/admin/users.html" class="admin-nav-item">
            <span>👥</span> 用户管理
          </a>
          <a href="/pages/admin/quota.html" class="admin-nav-item">
            <span>💰</span> 额度管理
          </a>
        </nav>
        <div class="admin-user">
          <div id="adminUsername">加载中...</div>
          <button id="logoutBtn" class="btn-logout">退出登录</button>
        </div>
      </aside>

      <!-- 主内容区 -->
      <main class="admin-main">
        <div class="admin-header">
          <h1>仪表盘</h1>
        </div>

        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-label">总用户数</div>
            <div class="stat-value" id="totalUsers">-</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">活跃用户</div>
            <div class="stat-value" id="activeUsers">-</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">禁用用户</div>
            <div class="stat-value" id="disabledUsers">-</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">总生成次数</div>
            <div class="stat-value" id="totalGenerations">-</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">本月生成</div>
            <div class="stat-value" id="thisMonthGenerations">-</div>
          </div>
        </div>

        <!-- 图表区域 -->
        <div class="charts-grid">
          <div class="admin-card">
            <h2>月度使用量趋势（最近12个月）</h2>
            <canvas id="monthlyUsageChart"></canvas>
          </div>

          <div class="admin-card">
            <h2>每日生成量（最近30天）</h2>
            <canvas id="dailyGenerationsChart"></canvas>
          </div>

          <div class="admin-card">
            <h2>用户增长趋势（最近12个月）</h2>
            <canvas id="userGrowthChart"></canvas>
          </div>

          <div class="admin-card">
            <h2>模型使用分布（最近30天）</h2>
            <canvas id="modelDistributionChart"></canvas>
          </div>

          <div class="admin-card">
            <h2>生成模式分布（最近30天）</h2>
            <canvas id="modeDistributionChart"></canvas>
          </div>

          <div class="admin-card">
            <h2>TOP 10 活跃用户（最近30天）</h2>
            <canvas id="topUsersChart"></canvas>
          </div>
        </div>

        <div class="admin-card">
          <h2>快速操作</h2>
          <div class="quick-actions">
            <a href="/pages/admin/users.html" class="action-btn">
              <span>👥</span>
              <div>
                <div class="action-title">用户管理</div>
                <div class="action-desc">查看和管理所有用户</div>
              </div>
            </a>
            <a href="/pages/admin/quota.html" class="action-btn">
              <span>💰</span>
              <div>
                <div class="action-title">额度管理</div>
                <div class="action-desc">调整用户额度</div>
              </div>
            </a>
          </div>
        </div>
      </main>
    </div>

    <script src="/pages/admin/admin.js"></script>
    <script src="/pages/admin/dashboard-charts.js"></script>
  </body>
</html>
