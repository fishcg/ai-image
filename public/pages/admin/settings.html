<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>管理后台 - 系统设置</title>
    <link rel="stylesheet" href="/common/styles.css" />
    <link rel="stylesheet" href="/pages/admin/admin.css" />
    <style>
      .settings-form { display: flex; flex-direction: column; gap: 20px; max-width: 500px; }
      .setting-group label { display: block; font-size: 14px; color: rgba(255,255,255,0.7); margin-bottom: 8px; }
      .setting-group input { width: 100%; }
      .setting-group .hint { font-size: 13px; color: rgba(255,255,255,0.4); margin-top: 4px; }
    </style>
  </head>
  <body>
    <div class="admin-layout">
      <div id="admin-sidebar-container"></div>
      <main class="admin-main">
        <div class="admin-header"><h1>系统设置</h1></div>
        <div class="admin-card">
          <h2>基本设置</h2>
          <div class="settings-form">
            <div class="setting-group">
              <label for="monthlyLimit">默认月度额度</label>
              <input id="monthlyLimit" class="search-input" type="number" min="0" />
              <div class="hint">每个用户每月可生成的图片数量（未设置自定义额度的用户使用此值）</div>
            </div>
            <div class="setting-group">
              <label for="sessionTtlDays">会话有效期（天）</label>
              <input id="sessionTtlDays" class="search-input" type="number" min="1" />
              <div class="hint">用户登录后的会话保持时间</div>
            </div>
            <div class="setting-group">
              <label for="maxUploadMb">最大上传大小（MB）</label>
              <input id="maxUploadMb" class="search-input" type="number" min="1" />
              <div class="hint">单次请求的最大上传文件大小</div>
            </div>
            <div>
              <button id="saveBtn" class="btn-primary">保存设置</button>
            </div>
          </div>
        </div>

        <div class="admin-card">
          <h2>模型配置</h2>
          <div class="settings-form">
            <div class="setting-group">
              <label for="defaultModel">默认模型</label>
              <select id="defaultModel" class="search-input">
                <option value="gpt-image">GPT Image（高质量，支持2K）</option>
                <option value="dashscope">快速修图/生成</option>
                <option value="google-nano-banana-pro">精修（Google Nano）</option>
                <option value="jimeng">即梦4.0（支持4K超清）</option>
              </select>
              <div class="hint">用户打开创作页面时默认选中的模型</div>
            </div>
            <div class="setting-group">
              <label>可用模型</label>
              <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 4px;">
                <label style="display: flex; align-items: center; gap: 10px; cursor: pointer; color: rgba(255,255,255,0.9); font-size: 14px;">
                  <input type="checkbox" id="enableGptImage" value="gpt-image" checked style="width: 16px; height: 16px; flex-shrink: 0;" /> GPT Image（高质量，支持2K）
                </label>
                <label style="display: flex; align-items: center; gap: 10px; cursor: pointer; color: rgba(255,255,255,0.9); font-size: 14px;">
                  <input type="checkbox" id="enableDashscope" value="dashscope" checked style="width: 16px; height: 16px; flex-shrink: 0;" /> 快速修图/生成
                </label>
                <label style="display: flex; align-items: center; gap: 10px; cursor: pointer; color: rgba(255,255,255,0.9); font-size: 14px;">
                  <input type="checkbox" id="enableNano" value="google-nano-banana-pro" checked style="width: 16px; height: 16px; flex-shrink: 0;" /> 精修（Google Nano）
                </label>
                <label style="display: flex; align-items: center; gap: 10px; cursor: pointer; color: rgba(255,255,255,0.9); font-size: 14px;">
                  <input type="checkbox" id="enableJimeng" value="jimeng" checked style="width: 16px; height: 16px; flex-shrink: 0;" /> 即梦4.0（支持4K超清）
                </label>
              </div>
              <div class="hint">取消勾选的模型将不会在创作页面显示</div>
            </div>
            <div>
              <button id="saveModelBtn" class="btn-primary">保存模型配置</button>
            </div>
          </div>
        </div>
      </main>
    </div>
    <script src="/pages/admin/admin.js"></script>
    <script>
      async function loadSettings() {
        try {
          const resp = await fetch('/api/admin/settings');
          if (!resp.ok) { if (resp.status === 401) { window.location.href = '/pages/admin/login.html'; return; } throw new Error(); }
          const data = await resp.json();
          const s = data.settings;
          document.getElementById('monthlyLimit').value = s.monthly_limit || 200;
          document.getElementById('sessionTtlDays').value = s.session_ttl_days || 30;
          document.getElementById('maxUploadMb').value = s.max_upload_mb || 60;

          // 模型配置
          document.getElementById('defaultModel').value = s.default_model || 'gpt-image';
          const enabled = (s.enabled_models || 'gpt-image,dashscope,google-nano-banana-pro,jimeng').split(',').map(s => s.trim());
          document.getElementById('enableGptImage').checked = enabled.includes('gpt-image');
          document.getElementById('enableDashscope').checked = enabled.includes('dashscope');
          document.getElementById('enableNano').checked = enabled.includes('google-nano-banana-pro');
          document.getElementById('enableJimeng').checked = enabled.includes('jimeng');
        } catch (e) { console.error(e); showToast('加载设置失败', 'error'); }
      }

      document.getElementById('saveBtn').addEventListener('click', async () => {
        const settings = {
          monthly_limit: document.getElementById('monthlyLimit').value,
          session_ttl_days: document.getElementById('sessionTtlDays').value,
          max_upload_mb: document.getElementById('maxUploadMb').value,
        };
        try {
          const resp = await fetch('/api/admin/settings', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ settings }),
          });
          if (!resp.ok) throw new Error();
          showToast('保存成功', 'success');
        } catch (e) { console.error(e); showToast('保存失败', 'error'); }
      });

      document.getElementById('saveModelBtn').addEventListener('click', async () => {
        const checkboxes = ['enableGptImage', 'enableDashscope', 'enableNano', 'enableJimeng'];
        const enabledModels = checkboxes
          .map(id => document.getElementById(id))
          .filter(el => el && el.checked)
          .map(el => el.value)
          .join(',');

        if (!enabledModels) { showToast('至少启用一个模型', 'error'); return; }

        const defaultModel = document.getElementById('defaultModel').value;
        if (!enabledModels.split(',').includes(defaultModel)) {
          showToast('默认模型必须在可用模型中', 'error');
          return;
        }

        try {
          const resp = await fetch('/api/admin/settings', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ settings: { default_model: defaultModel, enabled_models: enabledModels } }),
          });
          if (!resp.ok) throw new Error();
          showToast('模型配置已保存', 'success');
        } catch (e) { console.error(e); showToast('保存失败', 'error'); }
      });

      AdminLayout.init({ activePage: 'settings' });
      loadSettings();
    </script>
  </body>
</html>
