<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>管理后台 - 图片管理</title>
    <link rel="stylesheet" href="/common/styles.css" />
    <link rel="stylesheet" href="/pages/admin/admin.css" />
    <style>
      .image-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 16px;
      }
      .image-card {
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 10px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }
      .image-card-thumb {
        position: relative;
        aspect-ratio: 1;
        background: #0f172a;
        cursor: pointer;
        overflow: hidden;
      }
      .image-card-thumb img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        transition: transform 0.2s;
      }
      .image-card-thumb:hover img { transform: scale(1.04); }
      .image-count-badge {
        position: absolute;
        top: 8px;
        right: 8px;
        background: rgba(0,0,0,0.65);
        color: #fff;
        font-size: 11px;
        padding: 2px 7px;
        border-radius: 10px;
      }
      .shared-badge {
        position: absolute;
        top: 8px;
        left: 8px;
        background: rgba(16,185,129,0.85);
        color: #fff;
        font-size: 11px;
        padding: 2px 7px;
        border-radius: 10px;
      }
      .image-card-body {
        padding: 10px 12px;
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .image-card-user {
        font-size: 12px;
        color: rgba(255,255,255,0.5);
      }
      .image-card-prompt {
        font-size: 13px;
        color: rgba(255,255,255,0.85);
        line-height: 1.4;
        overflow: hidden;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        flex: 1;
      }
      .image-card-date {
        font-size: 11px;
        color: rgba(255,255,255,0.35);
      }
      .image-card-actions {
        display: flex;
        gap: 6px;
        padding: 8px 12px 12px;
      }
      .image-card-actions button {
        flex: 1;
        padding: 5px 0;
        font-size: 12px;
        border-radius: 6px;
        cursor: pointer;
        border: none;
        transition: opacity 0.15s;
      }
      .image-card-actions button:hover { opacity: 0.85; }
      .btn-share {
        background: rgba(99,102,241,0.8);
        color: #fff;
      }
      .btn-share:disabled {
        background: rgba(99,102,241,0.25);
        color: rgba(255,255,255,0.4);
        cursor: default;
      }
      .btn-del {
        background: rgba(239,68,68,0.7);
        color: #fff;
      }

      /* 分享弹窗图片选择 */
      .share-img-list {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
        gap: 8px;
        margin-bottom: 16px;
      }
      .share-img-item {
        aspect-ratio: 1;
        border-radius: 6px;
        overflow: hidden;
        cursor: pointer;
        border: 2px solid transparent;
        transition: border-color 0.15s;
      }
      .share-img-item.selected { border-color: #818cf8; }
      .share-img-item img { width: 100%; height: 100%; object-fit: cover; display: block; }

      /* 预览弹窗 */
      #previewModal img {
        max-width: 90vw;
        max-height: 85vh;
        border-radius: 8px;
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="admin-layout">
      <div id="admin-sidebar-container"></div>
      <main class="admin-main">
        <div class="admin-header"><h1>图片管理</h1></div>

        <div class="admin-card">
          <div id="imageGrid" class="image-grid">
            <div style="grid-column:1/-1;text-align:center;padding:60px;color:rgba(255,255,255,0.4);">加载中...</div>
          </div>

          <div class="pagination" style="margin-top:24px;">
            <button id="prevPage">上一页</button>
            <span class="page-info" id="pageInfo">-</span>
            <button id="nextPage">下一页</button>
          </div>
        </div>
      </main>
    </div>

    <!-- 分享弹窗 -->
    <div id="shareModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:1000;">
      <div style="background:#1e293b;border:1px solid rgba(255,255,255,0.15);border-radius:12px;padding:28px;width:min(480px,92%);margin:auto;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);">
        <h3 style="color:#fff;margin:0 0 16px 0;font-size:17px;">选择要分享到首页的图片</h3>
        <div id="shareImgList" class="share-img-list"></div>
        <div style="display:flex;gap:10px;justify-content:flex-end;">
          <button id="shareCancelBtn" class="btn-secondary">取消</button>
          <button id="shareConfirmBtn" class="btn-primary">确认分享</button>
        </div>
      </div>
    </div>

    <!-- 图片预览弹窗 -->
    <div id="previewModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:2000;display:none;align-items:center;justify-content:center;cursor:zoom-out;" onclick="closePreview()">
      <img id="previewImg" src="" alt="" />
    </div>

    <script src="/pages/admin/admin.js"></script>
    <script>
      let currentPage = 1;
      let totalPages = 1;
      let currentImages = [];

      // 分享弹窗状态
      let shareHistoryId = null;
      let shareUrls = [];
      let selectedShareUrl = null;

      async function loadImages() {
        try {
          const resp = await fetch(`/api/admin/images?page=${currentPage}&limit=20`);
          if (!resp.ok) {
            if (resp.status === 401) { window.location.href = '/pages/admin/login.html'; return; }
            throw new Error();
          }
          const data = await resp.json();
          currentImages = data.images || [];
          renderGrid(currentImages);
          updatePagination(data.pagination);
        } catch (e) {
          console.error(e);
          document.getElementById('imageGrid').innerHTML =
            '<div style="grid-column:1/-1;text-align:center;padding:60px;color:rgba(255,255,255,0.4);">加载失败</div>';
        }
      }

      function renderGrid(list) {
        const grid = document.getElementById('imageGrid');
        if (!list.length) {
          grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px;color:rgba(255,255,255,0.4);">暂无图片</div>';
          return;
        }
        grid.innerHTML = list.map((img) => {
          const thumb = img.outputImageUrls[0] || '';
          const count = img.outputImageUrls.length;
          const isShared = img.sharedCount > 0;
          return `
            <div class="image-card">
              <div class="image-card-thumb" onclick="openPreview(${JSON.stringify(thumb).replace(/"/g, '&quot;')})">
                ${thumb ? `<img src="${esc(thumb)}" alt="" loading="lazy" onerror="this.style.display='none'" />` : ''}
                ${count > 1 ? `<span class="image-count-badge">1/${count}</span>` : ''}
                ${isShared ? `<span class="shared-badge">已分享</span>` : ''}
              </div>
              <div class="image-card-body">
                <div class="image-card-user">${esc(img.username)}</div>
                <div class="image-card-prompt" title="${esc(img.prompt)}">${esc(img.prompt)}</div>
                <div class="image-card-date">${formatDate(img.createdAt)}</div>
              </div>
              <div class="image-card-actions">
                <button class="btn-share" onclick="openShareModal(${img.id})" ${isShared ? 'disabled title="已有图片分享到首页"' : ''}>
                  ${isShared ? '已分享' : '分享到首页'}
                </button>
                <button class="btn-del" onclick="deleteImage(${img.id})">删除</button>
              </div>
            </div>
          `;
        }).join('');
      }

      function updatePagination(p) {
        currentPage = p.page;
        totalPages = p.totalPages;
        document.getElementById('pageInfo').textContent = `第 ${p.page} / ${p.totalPages} 页 (共 ${p.total} 条)`;
        document.getElementById('prevPage').disabled = currentPage <= 1;
        document.getElementById('nextPage').disabled = currentPage >= totalPages;
      }

      async function deleteImage(id) {
        if (!confirm('确定要删除这条生成记录吗？此操作不可恢复。')) return;
        try {
          const resp = await fetch('/api/admin/images', {
            method: 'DELETE',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id }),
          });
          if (!resp.ok) throw new Error();
          showToast('已删除', 'success');
          loadImages();
        } catch { showToast('删除失败', 'error'); }
      }

      function openShareModal(historyId) {
        const img = currentImages.find(x => x.id === historyId);
        if (!img) return;
        shareHistoryId = historyId;
        shareUrls = img.outputImageUrls;
        selectedShareUrl = shareUrls[0] || null;

        const list = document.getElementById('shareImgList');
        list.innerHTML = shareUrls.map((url, i) => `
          <div class="share-img-item ${i === 0 ? 'selected' : ''}" data-url="${esc(url)}" onclick="selectShareImg(this, '${esc(url)}')">
            <img src="${esc(url)}" alt="" loading="lazy" />
          </div>
        `).join('');

        document.getElementById('shareModal').style.display = 'block';
      }

      function selectShareImg(el, url) {
        document.querySelectorAll('.share-img-item').forEach(x => x.classList.remove('selected'));
        el.classList.add('selected');
        selectedShareUrl = url;
      }

      document.getElementById('shareCancelBtn').addEventListener('click', () => {
        document.getElementById('shareModal').style.display = 'none';
      });
      document.getElementById('shareModal').addEventListener('click', (e) => {
        if (e.target === document.getElementById('shareModal')) document.getElementById('shareModal').style.display = 'none';
      });

      document.getElementById('shareConfirmBtn').addEventListener('click', async () => {
        if (!shareHistoryId || !selectedShareUrl) return;
        const btn = document.getElementById('shareConfirmBtn');
        btn.disabled = true;
        try {
          const resp = await fetch('/api/admin/images/share', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ historyId: shareHistoryId, imageUrl: selectedShareUrl }),
          });
          const data = await resp.json();
          if (!resp.ok) { showToast(data.error || '分享失败', 'error'); return; }
          showToast('已分享到首页', 'success');
          document.getElementById('shareModal').style.display = 'none';
          loadImages();
        } catch { showToast('分享失败', 'error'); } finally { btn.disabled = false; }
      });

      function openPreview(url) {
        if (!url) return;
        document.getElementById('previewImg').src = url;
        document.getElementById('previewModal').style.display = 'flex';
      }
      function closePreview() {
        document.getElementById('previewModal').style.display = 'none';
      }
      document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closePreview(); });

      function esc(t) { const d = document.createElement('div'); d.textContent = String(t); return d.innerHTML; }

      document.getElementById('prevPage').addEventListener('click', () => { if (currentPage > 1) { currentPage--; loadImages(); } });
      document.getElementById('nextPage').addEventListener('click', () => { if (currentPage < totalPages) { currentPage++; loadImages(); } });

      AdminLayout.init({ activePage: 'images' });
      loadImages();
    </script>
  </body>
</html>
